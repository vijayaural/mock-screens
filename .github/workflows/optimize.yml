name: Optimize Images
on:
  push:
    paths: ['**/*.png', '**/*.jpg', '**/*.jpeg']
jobs:
  webp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.head_ref }} }
      - name: Install cwebp
        run: sudo apt-get update && sudo apt-get install -y webp
      - name: Convert to WebP (max 1600px wide, quality 80)
        run: |
          find . -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' \) | while read f; do
            out="${f%.*}.webp"
            cwebp -q 80 -resize 1600 0 "$f" -o "$out"
          done
      - name: Commit WebP files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A '*.webp'
          git diff --staged --quiet || git commit -m "Auto-generate WebP"
          git push
